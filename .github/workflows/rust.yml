name: Rust Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Build Release Engine
      run: cargo build --release

    - name: Upload Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-filter-windows-exe
        path: target/release/ai-filter.exe

    - name: Zip for Release
      if: startsWith(github.ref, 'refs/tags/')
      run: Compress-Archive -Path target/release/ai-filter.exe, installer/install.bat, installer/uninstall.bat -DestinationPath ai-filter-x86_64-pc-windows-msvc.zip

    - name: GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ai-filter-x86_64-pc-windows-msvc.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
